<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión</title>
    <link rel="stylesheet" href="../../../..//sass/app.css">
    <link rel="shortcut icon" href="../static/image/icono.ico" type="image/x-icon">
</head>
<body>

<div class="img-login">
    <a href="../templeate/index.html">
        <img src="../static/image/icono.PNG" alt="logo">
    </a>
</div>

<div class="background-shapes"></div>

<div class="login-container">
    <div class="card-login">
        <h2>Iniciar Sesión</h2>

        <form action="" method="post">
            <label for="username">Correo</label>
            <input type="email" id="username" name="username" placeholder="nombre@mail.com" required>

            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" placeholder="contraseña" required>

            <a href="#" class="forgot">¿Olvidaste la contraseña?</a>

            <button type="submit" class="btn-primary">Iniciar sesión</button>
        </form>

        <p class="register">
            ¿No tienes cuenta aún? <a href="../templeate/signup.html">Regístrate</a>
        </p>
    </div>
</div>
</body>
</html>
